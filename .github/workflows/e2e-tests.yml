name: E2E Tests

on:
    push:
        branches:
            - main
    workflow_dispatch: # Allows manual triggering from GitHub UI
        inputs:
            test_filter:
                description: 'Test filter pattern (e.g., "Pass and score")'
                required: false
                default: ""

# Only the latest run matters: cancel any in-progress or queued run when a new
# push or manual dispatch lands. All events share one group on purpose —
# splitting workflow_dispatch into its own group can't actually protect manual
# runs, because run-tests.sh's preempt logic and the host-scoped cleanup step
# below would kill any concurrent run anyway.
concurrency:
    group: e2e-tests
    cancel-in-progress: true

jobs:
    e2e-tests:
        runs-on: self-hosted
        # Only run on the original repo, not forks
        if: github.repository == 'online-go/online-go.com'

        steps:
            # A previous cancel-in-progress kill may have left git locks or
            # orphan playwright processes behind; clean them up before starting.
            - name: Clear stale git locks and orphan playwright processes
              run: |
                  find /home/greenasjade/src/OGS/ogs/.git /home/greenasjade/src/OGS/ogs-ui/.git \
                       -name '*.lock' -delete
                  pkill -f 'chrome-headless-shell.*playwright_chromiumdev_profile' || true
                  pkill -f 'node.*node_modules/playwright' || true

            - name: Update ogs repo to get latest script
              run: cd /home/greenasjade/src/OGS/ogs && git pull origin main

            - name: Determine trigger source
              id: trigger
              env:
                  EVENT_NAME: ${{ github.event_name }}
              run: |
                  if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
                    echo "source=github-trigger" >> $GITHUB_OUTPUT
                  elif [ "$EVENT_NAME" = "push" ]; then
                    echo "source=ogs-ui" >> $GITHUB_OUTPUT
                  else
                    echo "source=unknown" >> $GITHUB_OUTPUT
                  fi

            - name: Run E2E Test Suite
              env:
                  TEST_FILTER: ${{ github.event.inputs.test_filter || '' }}
                  TRIGGER_SOURCE: ${{ steps.trigger.outputs.source }}
              run: |
                  /home/greenasjade/src/OGS/ogs/.e2e-ci/run-tests.sh "$TEST_FILTER" "$TRIGGER_SOURCE"
